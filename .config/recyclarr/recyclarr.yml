# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json

sonarr:
  sonarr:
    base_url: !secret sonarr_base_url
    api_key: !secret sonarr_api_key

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
        reset_unmatched_scores:
          enabled: true
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true

radarr:
  movies:
    base_url: !secret radarr_base_url
    api_key: !secret radarr_api_key

    quality_definition:
      type: movie

    quality_profiles:
      - trash_id: d1d67249d3890e49bc12e275d989a7e9 # HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        - trash_id: f8bf8eab4617f12dfdbd16303d8da245 # [Optional] Golden Rule HD
          select:
            - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        - trash_id: a3ac6af01d78e4f21fcb75f601ac96df # [Unwanted] Unwanted Formats
          select:
            - b8cd450cbfa689c0259a01d9e29ba3d6 # 3D
            - cae4ca30163749b891686f95532519bd # AV1
            - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
            - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
            - ed38b889b31be83fda192888e2286d83 # BR-DISK
            - 0a3f082873eb454bde444150b70253cc # Extras
            - e6886871085226c3da1830830146846c # Generated Dynamic HDR
            - 90a6f9a284dff5103f6346090e6280c8 # LQ
            - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)
            - 712d74cd88bceb883ee32f773656b1f5 # Sing-Along Versions
            - bfd8eb01832d646a0a89c4deb46f8564 # Upscaled
